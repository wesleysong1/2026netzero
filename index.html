<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탄소중립 여정 · 체험 부스</title>
<style>
  @font-face { font-display: swap; }
  :root{
    --ink:#16271E;
    --ink-soft:#3C5246;
    --leaf:#2FA86A;
    --leaf-deep:#1E7A4C;
    --ember:#E76F3C;
    --ember-deep:#C9512A;
    --sun:#F2B73D;
    --mist:#EAF1EC;
    --paper:#FFFFFF;
    --line:#D5E3D9;
    --shadow:0 10px 30px rgba(22,39,30,.10);
    --shadow-lift:0 18px 44px rgba(22,39,30,.18);
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 12% -10%, #F4FBF4 0%, transparent 55%),
      radial-gradient(900px 500px at 100% 0%, #F0F7FF 0%, transparent 50%),
      var(--mist);
    min-height:100%;
    line-height:1.55;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 60px;}

  /* ---------- 상단 탄소 게이지 (시그니처) ---------- */
  .meter-card{
    position:sticky;top:10px;z-index:30;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px 16px 16px;
    box-shadow:var(--shadow);
    margin-bottom:18px;
  }
  .meter-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:9px;}
  .meter-title{font-size:13px;font-weight:800;color:var(--ink-soft);letter-spacing:.02em;}
  .meter-state{font-size:13px;font-weight:800;}
  .gauge{position:relative;height:16px;border-radius:999px;
    background:linear-gradient(90deg,#F4B79F 0%,#F2B73D 48%,#7FD3A2 78%,#2FA86A 100%);
    box-shadow:inset 0 1px 3px rgba(0,0,0,.12);}
  .gauge-mask{position:absolute;top:0;right:0;height:100%;border-radius:999px;
    background:rgba(255,255,255,.78);transition:width .7s cubic-bezier(.22,1,.36,1);}
  .gauge-marker{position:absolute;top:50%;transform:translate(-50%,-50%);
    font-size:22px;transition:left .7s cubic-bezier(.22,1,.36,1);
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));}
  .gauge-ends{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;font-weight:700;color:var(--ink-soft);}
  .steps{display:flex;gap:6px;margin-top:12px;}
  .step-dot{flex:1;height:6px;border-radius:999px;background:var(--line);transition:background .4s;}
  .step-dot.done{background:var(--leaf);}
  .step-dot.active{background:var(--sun);}

  /* ---------- 카드 ---------- */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 24px 24px;
    box-shadow:var(--shadow);
    animation:rise .5s cubic-bezier(.22,1,.36,1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;
    letter-spacing:.03em;color:var(--leaf-deep);background:#E5F4EC;
    padding:6px 12px;border-radius:999px;margin-bottom:14px;}
  .tag{font-size:11px;font-weight:800;padding:4px 9px;border-radius:7px;letter-spacing:.02em;}
  .tag-geo{background:#E7F0FF;color:#2C5BB0;}
  .tag-soc{background:#FBEAD9;color:#B5651D;}
  .tag-act{background:#E5F4EC;color:var(--leaf-deep);}

  h1{font-size:30px;font-weight:900;line-height:1.2;letter-spacing:-.03em;margin-bottom:8px;}
  h2{font-size:23px;font-weight:900;line-height:1.25;letter-spacing:-.03em;margin-bottom:6px;}
  .lead{font-size:16px;color:var(--ink-soft);font-weight:500;}

  .lesson{margin-top:18px;border-left:4px solid var(--leaf);background:#F4FAF6;
    border-radius:0 14px 14px 0;padding:16px 18px;}
  .lesson h3{font-size:15px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
  .lesson p{font-size:14.5px;color:#2C4135;margin-bottom:8px;}
  .lesson p:last-child{margin-bottom:0;}
  .lesson b{color:var(--leaf-deep);font-weight:800;}
  .factrow{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .fact{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
  .fact .n{font-size:21px;font-weight:900;color:var(--ember-deep);letter-spacing:-.02em;}
  .fact .l{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px;}

  .q{font-size:18.5px;font-weight:800;margin-top:20px;margin-bottom:14px;line-height:1.4;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:#fff;border:2px solid var(--line);border-radius:14px;
    padding:15px 16px;font-size:15.5px;font-weight:600;color:var(--ink);cursor:pointer;
    transition:transform .12s,border-color .15s,background .15s;font-family:inherit;}
  .opt:hover{border-color:#9CCBB1;}
  .opt:active{transform:scale(.99);}
  .opt .mk{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);
    flex-shrink:0;display:grid;place-items:center;font-weight:900;font-size:13px;color:var(--ink-soft);}
  .opt.correct{border-color:var(--leaf);background:#EAF7F0;}
  .opt.correct .mk{background:var(--leaf);border-color:var(--leaf);color:#fff;}
  .opt.wrong{border-color:var(--ember);background:#FCEDE6;}
  .opt.wrong .mk{background:var(--ember);border-color:var(--ember);color:#fff;}
  .opt.locked{pointer-events:none;opacity:.55;}
  .opt.picked-multi{border-color:var(--leaf-deep);background:#EAF7F0;}
  .opt.picked-multi .mk{background:var(--leaf-deep);border-color:var(--leaf-deep);color:#fff;}

  .feedback{margin-top:16px;border-radius:14px;padding:14px 16px;font-size:14.5px;font-weight:600;
    animation:rise .35s ease;}
  .feedback.ok{background:#E8F6EE;color:var(--leaf-deep);border:1px solid #B7E2C9;}
  .feedback.no{background:#FCEDE6;color:var(--ember-deep);border:1px solid #F2C6B2;}
  .feedback b{font-weight:900;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--leaf);color:#fff;border:none;border-radius:14px;
    padding:16px 22px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
    width:100%;margin-top:18px;box-shadow:0 8px 18px rgba(47,168,106,.35);
    transition:transform .12s,box-shadow .15s,background .15s;letter-spacing:-.01em;}
  .btn:hover{background:var(--leaf-deep);box-shadow:var(--shadow-lift);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{background:#BFD6C8;box-shadow:none;cursor:not-allowed;}
  .btn-ghost{background:#fff;color:var(--leaf-deep);border:2px solid var(--line);box-shadow:none;}
  .btn-ghost:hover{background:#F4FAF6;border-color:#9CCBB1;color:var(--leaf-deep);}

  .field{width:100%;border:2px solid var(--line);border-radius:14px;padding:15px 16px;
    font-size:16px;font-family:inherit;font-weight:600;color:var(--ink);margin-top:6px;}
  .field:focus{outline:none;border-color:var(--leaf);}
  .label{font-size:13.5px;font-weight:800;color:var(--ink-soft);margin-top:16px;display:block;}

  /* ---------- 탄소발자국 체험 ---------- */
  .fp-q{margin-top:18px;}
  .fp-q .t{font-size:15.5px;font-weight:800;margin-bottom:10px;display:flex;gap:8px;align-items:center;}
  .fp-opts{display:flex;gap:9px;flex-wrap:wrap;}
  .fp-opt{flex:1;min-width:120px;border:2px solid var(--line);border-radius:13px;background:#fff;
    padding:13px 12px;cursor:pointer;font-family:inherit;text-align:center;transition:.15s;}
  .fp-opt .emo{font-size:24px;}
  .fp-opt .lab{font-size:13.5px;font-weight:700;margin-top:4px;color:var(--ink);}
  .fp-opt.sel{border-color:var(--leaf);background:#EAF7F0;}
  .fp-result{margin-top:20px;text-align:center;padding:22px;border-radius:16px;background:#F4FAF6;border:1px solid var(--line);}
  .fp-score{font-size:40px;font-weight:900;letter-spacing:-.03em;}

  /* ---------- 완료 ---------- */
  .done-hero{text-align:center;padding:14px 0 4px;}
  .done-earth{font-size:74px;animation:spin 10s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .seal{margin:20px auto 6px;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle at 30% 28%,#3CC07F,#1E7A4C);
    color:#fff;display:grid;place-content:center;text-align:center;
    box-shadow:0 14px 34px rgba(30,122,76,.4),inset 0 0 0 6px rgba(255,255,255,.18);
    border:5px dashed rgba(255,255,255,.5);animation:pop .6s cubic-bezier(.18,1.4,.4,1);}
  @keyframes pop{0%{transform:scale(.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .seal .s1{font-size:13px;font-weight:800;letter-spacing:.1em;opacity:.9;}
  .seal .s2{font-size:26px;font-weight:900;line-height:1.1;margin-top:2px;}
  .code-box{margin-top:18px;background:var(--ink);color:#fff;border-radius:16px;padding:18px;text-align:center;}
  .code-box .cl{font-size:12px;font-weight:700;opacity:.7;letter-spacing:.05em;}
  .code-box .cc{font-size:30px;font-weight:900;letter-spacing:.18em;margin-top:4px;font-variant-numeric:tabular-nums;}
  .notice{margin-top:16px;background:#FFF7E6;border:1px solid #F3DFA8;border-radius:14px;
    padding:15px 16px;font-size:14.5px;font-weight:700;color:#8A6314;display:flex;gap:10px;align-items:flex-start;}
  .summary{margin-top:16px;display:flex;gap:10px;}
  .sumcell{flex:1;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;text-align:center;}
  .sumcell .v{font-size:24px;font-weight:900;color:var(--leaf-deep);}
  .sumcell .k{font-size:12px;font-weight:600;color:var(--ink-soft);margin-top:2px;}

  .footnote{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:22px;opacity:.8;}
  .startlist{margin-top:18px;display:flex;flex-direction:column;gap:11px;}
  .startlist .row{display:flex;gap:12px;align-items:flex-start;background:#F4FAF6;border-radius:13px;padding:13px 15px;}
  .startlist .num{width:26px;height:26px;border-radius:8px;background:var(--leaf);color:#fff;font-weight:900;
    display:grid;place-items:center;flex-shrink:0;font-size:13px;}
  .startlist .row span{font-size:14.5px;font-weight:600;color:#2C4135;}

  .name-grid{display:flex;gap:12px;margin-top:6px;}
  .name-grid > div{flex:1;min-width:0;}
  .name-grid .label{margin-top:14px;}
  .name-grid .field{margin-top:6px;}

  @media (max-width:480px){
    .wrap{padding:12px 12px 48px;}
    .meter-card{top:6px;padding:12px 13px 13px;border-radius:15px;}
    .card{padding:20px 16px;border-radius:18px;}
    h1{font-size:24px;} h2{font-size:20px;}
    .lead{font-size:15px;}
    .q{font-size:17px;}
    .opt{padding:14px 13px;font-size:15px;gap:10px;}
    .opt .mk{width:24px;height:24px;}
    .fact{min-width:46%;}
    .fp-opt{min-width:0;flex:1 1 30%;padding:11px 8px;}
    .fp-opt .emo{font-size:21px;}
    .fp-opt .lab{font-size:12.5px;}
    .summary{gap:8px;}
    .sumcell{padding:11px 6px;}
    .sumcell .v{font-size:20px;}
    .btn{padding:15px 18px;font-size:15.5px;}
    .name-grid{gap:9px;}
  }
  @media (max-width:340px){
    .name-grid{flex-direction:column;gap:0;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 탄소 게이지 -->
  <div class="meter-card" id="meter">
    <div class="meter-top">
      <span class="meter-title">🌍 지구 탄소 게이지</span>
      <span class="meter-state" id="meterState">탄소 과잉 상태</span>
    </div>
    <div class="gauge">
      <div class="gauge-mask" id="gaugeMask" style="width:100%"></div>
      <div class="gauge-marker" id="gaugeMarker" style="left:6%">🔥</div>
    </div>
    <div class="gauge-ends"><span>🔥 탄소 과잉</span><span>탄소중립 🌱</span></div>
    <div class="steps" id="steps"></div>
  </div>

  <div id="app"></div>

  <div class="footnote">탄소중립 희현제 체험 부스 · 사회과</div>
</div>

<script>
/* ===================== 데이터 ===================== */
const TOTAL_STAGES = 5;

// 화면 시퀀스. stageEnd:true 인 화면을 통과하면 게이지 1칸 상승.
const screens = [
  { type:'intro' },

  // STAGE 1 — 개념
  { type:'lesson', stage:1, tag:['act','탄소중립 기초'], eyebrow:'STEP 1 · 탄소중립의 이해',
    title:'탄소중립이란 무엇일까?',
    lead:'기후위기 시대, 모든 사회가 함께 향하는 목표를 먼저 이해해 봐요.',
    blocks:[
      { h:'🌱 탄소중립(넷제로)이란?', p:'사람의 활동으로 <b>배출</b>되는 온실가스를 최대한 줄이고, 그래도 남는 양은 숲·기술로 <b>흡수·제거</b>해서 실질 배출량을 <b>0</b>으로 만드는 것을 말해요.' },
      { h:'🏭 온실가스, 무엇이 문제일까?', p:'온실가스(이산화탄소·메탄 등)는 지구의 열을 가둬요. 너무 많아지면 지구가 점점 더 뜨거워지는 <b>지구온난화</b>가 일어납니다.' }
    ],
    facts:[ {n:'CO₂', l:'대표적인 온실가스'}, {n:'2050', l:'대한민국 탄소중립 목표'} ]
  },
  { type:'quiz', stage:1, tag:['act','개념'],
    q:'탄소중립(넷제로)의 의미로 가장 알맞은 것은?',
    opts:[
      {t:'탄소를 아예 만들지도, 쓰지도 않는 것'},
      {t:'배출한 온실가스를 흡수·제거해 실질 배출량을 0으로 만드는 것', correct:true},
      {t:'탄소를 지금보다 더 많이 배출하는 것'},
      {t:'모든 공장을 즉시 멈추는 것'}
    ],
    explain:'탄소중립은 배출을 0으로 하는 게 아니라, <b>배출량 − 흡수량 = 0</b>이 되도록 균형을 맞추는 것이에요.'
  },
  { type:'quiz', stage:1, tag:['act','개념'], stageEnd:true,
    q:'다음 중 지구온난화를 일으키는 대표적인 온실가스는?',
    opts:[ {t:'산소(O₂)'}, {t:'질소(N₂)'}, {t:'이산화탄소(CO₂)', correct:true}, {t:'헬륨(He)'} ],
    explain:'<b>이산화탄소(CO₂)</b>는 가장 대표적인 온실가스로, 화석연료를 태울 때 많이 나와요.'
  },

  // STAGE 2 — 지리
  { type:'lesson', stage:2, tag:['geo','지리 · 기후변화'], eyebrow:'STEP 2 · 기후변화와 지구',
    title:'기후변화는 지구를 어떻게 바꿀까?',
    lead:'지리 시간에 배운 자연환경이 기후변화로 어떻게 달라지는지 살펴봐요.',
    blocks:[
      { h:'🌡️ 더워지는 지구', p:'평균 기온이 오르면 극지방의 <b>빙하와 빙상이 녹고</b>, 따뜻해진 바닷물이 부피가 커지면서 <b>해수면이 상승</b>해요.' },
      { h:'⛈️ 잦아지는 이상기후', p:'<b>폭염·가뭄·집중호우·태풍</b> 같은 이상기후가 더 자주, 더 세게 나타나 사람들의 삶의 터전을 위협합니다.' }
    ],
    facts:[ {n:'1.5℃', l:'지키려는 기온 상승 한계'}, {n:'해수면↑', l:'섬·해안 도시 위협'} ]
  },
  { type:'quiz', stage:2, tag:['geo','지리'],
    q:'지구온난화로 나타나는 현상으로 보기 <u>어려운</u> 것은?',
    opts:[
      {t:'극지방의 빙하가 녹는다'},
      {t:'바다의 평균 수위(해수면)가 높아진다'},
      {t:'폭염·집중호우 같은 이상기후가 늘어난다'},
      {t:'사계절이 더 뚜렷하고 안정적으로 변한다', correct:true}
    ],
    explain:'지구온난화는 기후를 <b>불안정</b>하게 만들어요. 계절의 경계가 흐려지고 이상기후가 잦아집니다.'
  },
  { type:'quiz', stage:2, tag:['geo','지리'], stageEnd:true,
    q:'해수면이 높아지는 직접적인 원인으로 알맞은 것은?',
    opts:[
      {t:'빙하·빙상이 녹고, 따뜻해진 바닷물이 팽창해서', correct:true},
      {t:'사람들이 바닷물을 너무 많이 사용해서'},
      {t:'강물이 모두 말라버려서'},
      {t:'달의 인력이 갑자기 사라져서'}
    ],
    explain:'<b>육지 빙하가 녹아 바다로 흘러들고</b>, 수온이 올라 바닷물 부피가 커지면서 해수면이 상승해요.'
  },

  // STAGE 3 — 일반사회/정책·경제
  { type:'lesson', stage:3, tag:['soc','일반사회 · 정책과 경제'], eyebrow:'STEP 3 · 탄소중립과 우리 사회',
    title:'사회는 어떻게 탄소를 줄일까?',
    lead:'국가·기업·시민이 함께 만드는 제도와 약속을 알아봐요.',
    blocks:[
      { h:'🌐 세계의 약속, 파리협정', p:'2015년 세계 여러 나라가 모여 지구 평균기온 상승을 산업화 이전 대비 <b>1.5℃</b> 안으로 막기로 약속한 국제 협약이에요.' },
      { h:'💰 시장을 움직이는 제도', p:'<b>탄소세</b>는 온실가스를 배출하면 세금을 매겨 배출을 줄이도록 유도해요. <b>배출권 거래제</b>는 정해진 배출 권리를 사고팔게 하는 제도랍니다.' }
    ],
    facts:[ {n:'2015', l:'파리협정 채택'}, {n:'RE100', l:'재생에너지 100% 사용 운동'} ]
  },
  { type:'quiz', stage:3, tag:['soc','일반사회'],
    q:'2015년 채택되어, 지구 평균기온 상승을 억제하기로 한 국제 협약은?',

  solved:{},
  stagesDone:0,
  footprint:null,
  pledge:'',
  code:''
};

const app = document.getElementById('app');
const STAGE_LABEL = ['🔥 탄소 과잉 상태','🌤️ 줄이는 중','🌥️ 더 줄이는 중','🌱 거의 다 왔어요','🍃 균형에 가까워요','🌍 탄소중립 달성!'];

/* ===================== 게이지 ===================== */
function buildSteps(){
  const s = document.getElementById('steps');
  s.innerHTML='';
  for(let i=0;i<TOTAL_STAGES;i++){
    const d=document.createElement('div');
    d.className='step-dot'; d.id='dot'+i;
    s.appendChild(d);
  }
}
function updateMeter(){
  const done = state.stagesDone;
  const pct = done/TOTAL_STAGES;            // 0~1
  const mask = (1-pct)*100;                 // 남은 탄소(흰색 마스크)
  document.getElementById('gaugeMask').style.width = mask+'%';
  const markerLeft = 6 + pct*(94-6);
  const marker = document.getElementById('gaugeMarker');
  marker.style.left = markerLeft+'%';
  marker.textContent = done>=TOTAL_STAGES ? '🌍' : done>=3 ? '🌱' : done>=1 ? '🌤️' : '🔥';
  document.getElementById('meterState').textContent = STAGE_LABEL[Math.min(done,5)];
  document.getElementById('meterState').style.color = done>=TOTAL_STAGES ? 'var(--leaf-deep)' : done>=1 ? 'var(--sun)' : 'var(--ember-deep)';

  const cur = screens[state.idx];
  const curStage = cur && cur.stage ? cur.stage : 0;
  for(let i=0;i<TOTAL_STAGES;i++){
    const dot=document.getElementById('dot'+i);
    dot.className='step-dot';
    if(i<done) dot.classList.add('done');
    else if(i===curStage-1) dot.classList.add('active');
  }
}

/* ===================== 렌더 ===================== */
function tagHTML(tag){
  if(!tag) return '';
  const map={geo:'tag-geo',soc:'tag-soc',act:'tag-act'};
  return `<span class="tag ${map[tag[0]]}">${tag[1]}</span>`;
}
function go(n){ state.idx=n; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function next(){ go(state.idx+1); }

function render(){
  const sc = screens[state.idx];
  updateMeter();
  if(sc.type==='intro') return renderIntro();
  if(sc.type==='lesson') return renderLesson(sc);
  if(sc.type==='quiz') return renderQuiz(sc);
  if(sc.type==='footprint') return renderFootprint(sc);
  if(sc.type==='practice') return renderPractice(sc);
  if(sc.type==='pledge') return renderPledge(sc);
  if(sc.type==='done') return renderDone();
}

function renderQuiz(sc){

/* ---------- 실천 (복수 정답) ---------- */
function renderPractice(sc){
  const opts=[
    {t:'가까운 거리는 걷거나 자전거 타기', good:true},
    {t:'안 쓰는 플러그(콘센트) 뽑기', good:true},
    {t:'일회용품 대신 다회용품(텀블러 등) 쓰기', good:true},
    {t:'분리배출을 정확하게 하기', good:true},
    {t:'사용하지 않는 방의 불을 계속 켜 두기', good:false},
    {t:'아주 가까운 거리도 자가용 타기', good:false}
  ];
  // 보기 순서 섞기
  for(let i=opts.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
  const picked=new Set();
  app.innerHTML=`
  <div class="card">
    <span class="eyebrow">STEP 5 · 시민의 실천</span> ${tagHTML(['act','실천'])}
    <h2>탄소중립 실천 가려내기</h2>
    <p class="lead">탄소중립에 <b>도움이 되는 행동만</b> 모두 골라보세요. (옳은 것 4개)</p>
    <div class="opts" id="opts" style="margin-top:18px">
      ${opts.map((o,i)=>`
        <button class="opt" data-i="${i}">
          <span class="mk">✓</span><span>${o.t}</span>
        </button>`).join('')}
    </div>
    <div id="fb"></div>
    <button class="btn" id="check" style="margin-top:16px">정답 확인하기</button>
  </div>`;
  const optEls=[...document.querySelectorAll('#opts .opt')];
  optEls.forEach(b=>{
    b.onclick=()=>{
      if(b.classList.contains('locked')) return;
      const i=+b.dataset.i;
      if(picked.has(i)){picked.delete(i);b.classList.remove('picked-multi');}
      else{picked.add(i);b.classList.add('picked-multi');}
    };
  });
  document.getElementById('check').onclick=()=>{
    const correctSet=opts.map((o,i)=>o.good?i:-1).filter(i=>i>=0);
    const ok = correctSet.every(i=>picked.has(i)) && [...picked].every(i=>opts[i].good);
    if(ok){
      optEls.forEach((b,i)=>{b.classList.add('locked'); if(opts[i].good)b.classList.add('correct');});
      if(!state.solved['practice']){ state.correct++; state.solved['practice']=true; }
      document.getElementById('fb').innerHTML=`<div class="feedback ok">⭕ 정확해요! 작은 실천이 모이면 사회 전체의 배출을 줄일 수 있어요.</div>`;
      const c=document.getElementById('check');
      c.textContent='마지막 다짐하러 가기 →';
      c.onclick=next;
    }else{
      optEls.forEach((b,i)=>{
        b.classList.remove('correct','wrong');
        if(picked.has(i)&&!opts[i].good) b.classList.add('wrong');
        if(opts[i].good) b.classList.add('correct');
      });
      document.getElementById('fb').innerHTML=`<div class="feedback no">❌ 초록색이 옳은 실천, 빨간색은 도움이 되지 않는 행동이에요. 다시 골라볼까요?</div>`;
      // 다시 선택 가능하도록 잠금 해제
      setTimeout(()=>{ picked.clear(); optEls.forEach(b=>{b.classList.remove('correct','wrong','picked-multi');}); },1400);
    }
  };
}

function renderPledge(sc){
  const pledges=[
    '🚶 가까운 거리는 걷거나 자전거를 탈게요',
    '🔌 안 쓰는 전기 코드를 뽑을게요',
    '🧴 일회용품 대신 다회용품을 쓸게요',
    '♻️ 분리배출을 정확하게 할게요'
  ];
  app.innerHTML=`
  <div class="card">
    <span class="eyebrow">STEP 5 · 나의 다짐</span> ${tagHTML(['act','실천'])}
    <h2>오늘부터 실천할 다짐 한 가지</h2>
    <p class="lead">${state.name} 님이 가장 잘 지킬 수 있는 다짐을 골라주세요.</p>
    <div class="opts" id="pl" style="margin-top:18px">
      ${pledges.map((p,i)=>`<button class="opt" data-i="${i}"><span class="mk">♡</span><span>${p}</span></button>`).join('')}
      <button class="opt" data-i="etc"><span class="mk">✏️</span><span>기타 · 나만의 다짐을 직접 적을게요</span></button>
    </div>
    <input class="field" id="etcInput" placeholder="나만의 다짐을 적어보세요" maxlength="40" autocomplete="off" style="display:none;margin-top:6px">
    <button class="btn" id="fin" disabled style="margin-top:18px">다짐하고 미션 완료! 🎉</button>
  </div>`;
  const els=[...document.querySelectorAll('#pl .opt')];
  const etcInput=document.getElementById('etcInput');
  const fin=document.getElementById('fin');
  let mode=null; // 'preset' | 'etc'

  function refresh(){
    if(mode==='preset') fin.disabled=false;
    else if(mode==='etc') fin.disabled = etcInput.value.trim().length===0;
    else fin.disabled=true;
  }

  els.forEach(b=>{
    b.onclick=()=>{
      els.forEach(x=>x.classList.remove('picked-multi'));
      b.classList.add('picked-multi');
      if(b.dataset.i==='etc'){
        mode='etc';
        etcInput.style.display='block';
        etcInput.focus();
        state.pledge=etcInput.value.trim();
      }else{
        mode='preset';
        etcInput.style.display='none';
        state.pledge=pledges[+b.dataset.i];
      }
      refresh();
    };
  });
  etcInput.addEventListener('input',()=>{ state.pledge=etcInput.value.trim(); refresh(); });

  fin.onclick=()=>{
    if(mode==='etc') state.pledge = etcInput.value.trim() || '나만의 탄소중립 실천을 다짐했어요';
    state.stagesDone=5;
    next();
  };
}

      <div class="sumcell"><div class="v">5 / 5</div><div class="k">통과한 단계</div></div>
      <div class="sumcell"><div class="v">${state.correct}</div><div class="k">맞힌 문제</div></div>
      <div class="sumcell"><div class="v">${state.footprint?state.footprint.total+'점':'-'}</div><div class="k">나의 탄소발자국</div></div>
    </div>

    ${state.pledge?`<div class="notice" style="background:#EAF7F0;border-color:#B7E2C9;color:var(--leaf-deep)">🌱 <div>나의 다짐 · <b>${state.pledge}</b></div></div>`:''}

    <div class="code-box">
      <div class="cl">완료 인증 코드</div>
      <div class="cc">${state.code}</div>
    </div>

    <div class="notice">🟡 <div>이 화면과 인증 코드를 <b>선생님께 보여드리고 성공 도장</b>을 받으세요!</div></div>

    <button class="btn btn-ghost" id="again">처음부터 다시 도전하기 ↺</button>
  </div>`;
  // 간단한 축하 효과
  burst();
  document.getElementById('again').onclick=()=>{
    state.idx=0; state.studentId=''; state.name=''; state.correct=0; state.firstTry=0;
    state.solved={}; state.stagesDone=0; state.footprint=null; state.pledge=''; state.code='';
    render(); window.scrollTo({top:0,behavior:'smooth'});
  };
}

/* 이모지 축하 효과 */
function burst(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const emo=['🎉','🌱','🌍','✨','🍃'];
  for(let i=0;i<24;i++){
    const s=document.createElement('div');
    s.textContent=emo[i%emo.length];
    s.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-40px;font-size:${18+Math.random()*16}px;
      z-index:99;pointer-events:none;transition:transform 2.4s ease-in, opacity 2.4s;`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>{
      s.style.transform=`translateY(${100+Math.random()*20}vh) rotate(${Math.random()*360}deg)`;
      s.style.opacity='0';
    });
    setTimeout(()=>s.remove(),2500);
  }
}

/* ===================== 시작 ===================== */
buildSteps();
render();
</script>
</body>
</html>
